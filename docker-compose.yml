services:
  mongodb:
    image: mongo:7
    container_name: esg-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: esgplatform
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    container_name: esg-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/esgplatform
    depends_on:
      - mongodb

volumes:
  mongo-data: